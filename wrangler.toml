name = "gramsevamitra-hub"
compatibility_date = "2024-06-11"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "apps/hub/dist"

# Cloudflare D1 — Better Auth identity store (Phase 1)
[[d1_databases]]
binding = "DB"
database_name = "gramsevamitra-auth"
# Populated after: npx wrangler d1 create gramsevamitra-auth
database_id = "df383016-db6c-4761-97ec-58a16c75efa5"

# Ephemeral Pro document uploads (1-hour lifecycle rule on bucket — configure in dashboard)
[[r2_buckets]]
binding = "PRO_TRANSIENT"
bucket_name = "gramsevamitra-pro-transient"

[vars]
BETTER_AUTH_URL = "https://gramsevamitra.com"
